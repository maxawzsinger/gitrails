<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitRails</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.8.1/github-markdown.min.css"
    />
    <style>
      :root {
        color-scheme: light dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #0d1117;
        color: #c9d1d9;
      }

      main {
        min-height: 100vh;
        padding: 32px 16px;
      }

      .markdown-body {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px;
        border: 1px solid #30363d;
        border-radius: 12px;
        background: #161b22;
      }

      .status {
        max-width: 960px;
        margin: 0 auto;
        padding: 24px;
        border: 1px solid #30363d;
        border-radius: 12px;
        background: #161b22;
      }

      .repo-link {
        max-width: 960px;
        margin: 0 auto 16px;
      }

      .repo-link a {
        display: inline-block;
        padding: 10px 14px;
        border: 1px solid #30363d;
        border-radius: 999px;
        background: #161b22;
        color: #58a6ff;
        text-decoration: none;
      }

      .repo-link a:hover {
        background: #1f2630;
      }

      .status[hidden] {
        display: none;
      }

      a {
        color: #58a6ff;
      }

      @media (max-width: 640px) {
        main {
          padding: 16px 8px;
        }

        .markdown-body,
        .status {
          padding: 20px;
          border-radius: 8px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="repo-link">
        <a
          href="https://github.com/maxawzsinger/gitrails"
          target="_blank"
          rel="noreferrer"
          >Open `maxawzsinger/gitrails` on GitHub</a
        >
      </div>
      <section id="status" class="status">Loading README...</section>
      <article id="content" class="markdown-body" hidden></article>
    </main>

    <script type="module">
      import { marked } from "https://cdn.jsdelivr.net/npm/marked/lib/marked.esm.js";

      const readmeUrl =
        "https://raw.githubusercontent.com/maxawzsinger/gitrails/main/README.md";
      const repoUrl = "https://github.com/maxawzsinger/gitrails";
      const statusEl = document.getElementById("status");
      const contentEl = document.getElementById("content");

      const toGitHubUrl = (value) => {
        if (!value) {
          return value;
        }

        if (
          value.startsWith("http://") ||
          value.startsWith("https://") ||
          value.startsWith("#") ||
          value.startsWith("mailto:")
        ) {
          return value;
        }

        return `${repoUrl}/blob/main/${value.replace(/^\.\//, "")}`;
      };

      const toImageUrl = (value) => {
        if (!value) {
          return value;
        }

        if (
          value.startsWith("http://") ||
          value.startsWith("https://") ||
          value.startsWith("data:")
        ) {
          return value;
        }

        return `https://raw.githubusercontent.com/maxawzsinger/gitrails/main/${value.replace(/^\.\//, "")}`;
      };

      const rewriteRelativeUrls = (root) => {
        for (const linkEl of root.querySelectorAll("a[href]")) {
          linkEl.href = toGitHubUrl(linkEl.getAttribute("href"));
          linkEl.target = "_blank";
          linkEl.rel = "noreferrer";
        }

        for (const imageEl of root.querySelectorAll("img[src]")) {
          imageEl.src = toImageUrl(imageEl.getAttribute("src"));
        }
      };

      marked.use({
        renderer: {
          link({ href, title, tokens }) {
            const text = this.parser.parseInline(tokens);
            const safeHref = toGitHubUrl(href);
            const titleAttr = title ? ` title="${title}"` : "";

            return `<a href="${safeHref}"${titleAttr} target="_blank" rel="noreferrer">${text}</a>`;
          },
          image({ href, title, text }) {
            const safeHref = toImageUrl(href);
            const titleAttr = title ? ` title="${title}"` : "";

            return `<img src="${safeHref}" alt="${text}"${titleAttr} />`;
          },
        },
      });

      try {
        const response = await fetch(readmeUrl);
        if (!response.ok) {
          throw new Error(`Request failed with ${response.status}`);
        }

        const markdown = await response.text();
        contentEl.innerHTML = marked.parse(markdown);
        rewriteRelativeUrls(contentEl);
        contentEl.hidden = false;
        statusEl.hidden = true;
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        statusEl.innerHTML = `
          <h1>Unable to load README</h1>
          <p>${message}</p>
          <p><a href="${repoUrl}" target="_blank" rel="noreferrer">Open the repository on GitHub</a></p>
        `;
      }
    </script>
  </body>
</html>
